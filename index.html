<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>わくわく！さんすうドリル</title>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f7fff7;
            --accent-color: #ffe66d;
        }

        body {
            font-family: 'Kosugi Maru', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            touch-action: manipulation; /* ダブルタップズーム防止 */
        }

        #game-container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 0 #ddd;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 5px solid var(--secondary-color);
        }

        h1 { color: var(--primary-color); font-size: 1.5rem; margin-bottom: 10px; }

        #stats {
            display: flex;
            justify-content: space-around;
            font-weight: bold;
            color: #555;
            margin-bottom: 20px;
        }

        #question {
            font-size: 3.5rem;
            margin: 20px 0;
            color: #333;
        }

        #answer-display {
            font-size: 2.5rem;
            height: 3.5rem;
            border-bottom: 4px solid var(--secondary-color);
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        /* カスタムテンキー */
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .btn {
            background: #eee;
            border: none;
            border-radius: 15px;
            padding: 15px;
            font-size: 1.5rem;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 5px 0 #ccc;
            transition: 0.1s;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #ccc;
        }

        .btn-clear { background: #ffbdc3; }
        .btn-enter { background: var(--accent-color); grid-column: span 2; }

        /* まる・ばつ表示 */
        #feedback {
            position: absolute;
            font-size: 10rem;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0;
        }

        .correct { color: #ff6b6b; animation: pop 0.5s forwards; }
        .wrong { color: #4eacf5; animation: pop 0.5s forwards; }

        @keyframes pop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>わくわく！さんすうドリル</h1>
    <div id="stats">
        <span>のこり: <span id="remain">10</span></span>
        <span>スコア: <span id="score">0</span></span>
    </div>
    
    <div id="question">10 + 5</div>
    <div id="answer-display"></div>

    <div class="numpad">
        <button class="btn" onclick="addNum(1)">1</button>
        <button class="btn" onclick="addNum(2)">2</button>
        <button class="btn" onclick="addNum(3)">3</button>
        <button class="btn" onclick="addNum(4)">4</button>
        <button class="btn" onclick="addNum(5)">5</button>
        <button class="btn" onclick="addNum(6)">6</button>
        <button class="btn" onclick="addNum(7)">7</button>
        <button class="btn" onclick="addNum(8)">8</button>
        <button class="btn" onclick="addNum(9)">9</button>
        <button class="btn btn-clear" onclick="clearAns()">C</button>
        <button class="btn" onclick="addNum(0)">0</button>
        <button class="btn btn-enter" onclick="checkAnswer()">こたえる！</button>
    </div>
</div>

<div id="feedback"></div>

<script>
    let currentAns = "";
    let correctValue = 0;
    let score = 0;
    let remaining = 10;

    const questionEl = document.getElementById('question');
    const answerEl = document.getElementById('answer-display');
    const scoreEl = document.getElementById('score');
    const remainEl = document.getElementById('remain');
    const feedbackEl = document.getElementById('feedback');

    function initGame() {
        if (remaining <= 0) {
            alert(`おわり！スコアは ${score}点 だったよ！`);
            location.reload();
            return;
        }
        
        // 足し算か引き算をランダムに生成
        const isAdd = Math.random() > 0.5;
        let n1 = Math.floor(Math.random() * 10) + 1;
        let n2 = Math.floor(Math.random() * 10) + 1;

        if (isAdd) {
            correctValue = n1 + n2;
            questionEl.innerText = `${n1} + ${n2}`;
        } else {
            // 引き算は答えがマイナスにならないように
            if (n1 < n2) [n1, n2] = [n2, n1];
            correctValue = n1 - n2;
            questionEl.innerText = `${n1} - ${n2}`;
        }
        currentAns = "";
        answerEl.innerText = "";
    }

    function addNum(num) {
        if (currentAns.length < 3) {
            currentAns += num;
            answerEl.innerText = currentAns;
        }
    }

    function clearAns() {
        currentAns = "";
        answerEl.innerText = "";
    }

    function checkAnswer() {
        if (currentAns === "") return;

        if (parseInt(currentAns) === correctValue) {
            showFeedback("○", "correct");
            score += 10;
        } else {
            showFeedback("×", "wrong");
        }

        remaining--;
        scoreEl.innerText = score;
        remainEl.innerText = remaining;
        
        setTimeout(initGame, 600);
    }

    function showFeedback(mark, className) {
        feedbackEl.innerText = mark;
        feedbackEl.className = className;
        // アニメーションをリセットするために一度クラスを消して再度つけるハック
        feedbackEl.style.animation = 'none';
        feedbackEl.offsetHeight; 
        feedbackEl.style.animation = null;
    }

    // 起動
    initGame();
</script>

</body>
</html>
